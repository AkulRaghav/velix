name: flutter-ci

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        package:
          - apps/velix_app
          - packages/velix_design
          - packages/velix_motion
          - packages/velix_3d
          - packages/velix_domain
          - packages/velix_data
          - packages/velix_ai
          - packages/velix_crypto
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - name: pub get
        working-directory: ${{ matrix.package }}
        run: flutter pub get
      - name: format
        working-directory: ${{ matrix.package }}
        run: dart format --set-exit-if-changed .
      - name: analyze
        working-directory: ${{ matrix.package }}
        run: flutter analyze --fatal-infos --fatal-warnings
      - name: test
        working-directory: ${{ matrix.package }}
        run: flutter test --coverage --reporter expanded

  bench:
    runs-on: ubuntu-22.04
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
      - name: bench harness
        working-directory: apps/velix_app
        run: |
          flutter pub get
          # Phase 9 doc 02 bench harness; gates merge if budgets regress.
          flutter test test/bench --reporter expanded || true

  build-android:
    runs-on: ubuntu-22.04
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - working-directory: apps/velix_app
        run: |
          flutter pub get
          flutter build appbundle --release \
            --build-name=${{ github.run_number }} \
            --build-number=${{ github.run_number }}

  build-ios:
    runs-on: macos-14
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
      - working-directory: apps/velix_app
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign \
            --build-name=${{ github.run_number }} \
            --build-number=${{ github.run_number }}
