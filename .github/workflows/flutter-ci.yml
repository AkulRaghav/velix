name: flutter-ci

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
      - name: pub get (app resolves all workspace packages)
        working-directory: apps/velix_app
        run: flutter pub get
      - name: analyze
        working-directory: apps/velix_app
        run: |
          output=$(flutter analyze 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "error •"; then
            echo "::error::Flutter analyze found errors"
            exit 1
          fi
      - name: test
        working-directory: apps/velix_app
        run: flutter test
      - name: test velix_data
        working-directory: packages/velix_data
        run: |
          dart pub get
          dart test

  build-android:
    runs-on: ubuntu-22.04
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: build APK
        working-directory: apps/velix_app
        run: |
          flutter pub get
          flutter build apk --release
