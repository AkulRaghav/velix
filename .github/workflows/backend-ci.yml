name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/**/go.sum
      - name: install proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: govet (each service module standalone)
        working-directory: backend
        run: |
          for svc in services/*/; do
            (cd "$svc" && GOWORK=off go vet ./...)
          done
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend/services/routing
        env:
          GOWORK: 'off'

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/**/go.sum
      - name: alpha build + test
        working-directory: backend/alpha
        run: |
          go build ./...
          go test -race -count=1 -timeout=2m ./...
      - name: generated proto stubs build
        working-directory: backend/proto/gen/go
        env:
          GOWORK: 'off'
        run: go build ./...
      - name: unit tests
        working-directory: backend
        run: |
          for svc in services/*/; do
            (cd "$svc" && GOWORK=off go test -race -count=1 -timeout=2m ./...)
          done
      - name: shared package tests
        working-directory: backend
        run: |
          for pkg in pkg/velixobsslog pkg/velixsqlpgx pkg/velixnatsjs pkg/velixhealth pkg/velixgrpcauth pkg/velixtoken; do
            (cd "$pkg" && GOWORK=off go build ./... && GOWORK=off go test -count=1 ./...)
          done

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: velix
          POSTGRES_PASSWORD: velix
          POSTGRES_DB: velix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U velix"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      nats:
        image: nats:2-alpine
        ports:
          - 4222:4222
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/**/go.sum
      - name: install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: create per-service databases
        env:
          PGPASSWORD: velix
        run: |
          for db in velix_routing velix_identity velix_media velix_push velix_call velix_notifier; do
            psql -h localhost -U velix -d velix -c "CREATE DATABASE $db;"
          done
      - name: apply migrations + run integration tests
        working-directory: backend
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          declare -A DBS=( [routing]=velix_routing [identity]=velix_identity [media]=velix_media [push]=velix_push [call]=velix_call [notifier]=velix_notifier )
          for svc in "${!DBS[@]}"; do
            dsn="postgres://velix:velix@localhost:5432/${DBS[$svc]}?sslmode=disable"
            goose -dir "services/$svc/migrations" postgres "$dsn" up
          done
          # Run any tagged integration tests against the live databases.
          for svc in "${!DBS[@]}"; do
            export VELIX_TEST_DSN="postgres://velix:velix@localhost:5432/${DBS[$svc]}?sslmode=disable"
            (cd "services/$svc" && GOWORK=off go test -tags=integration -count=1 ./... )
          done
      - name: NATS publish/consume round-trip
        working-directory: backend
        env:
          VELIX_TEST_NATS_URL: nats://localhost:4222
        run: |
          (cd pkg/velixnatsjs && GOWORK=off go test -tags=integration -count=1 -run RoundTrip ./...)

  buf-breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - uses: bufbuild/buf-lint-action@v1
        with:
          input: backend/proto
      - uses: bufbuild/buf-breaking-action@v1
        with:
          input: backend/proto
          against: 'https://github.com/${{ github.repository }}.git#branch=main,subdir=backend/proto'

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: lint + template all service charts
        run: |
          for svc in routing identity media push call notifier; do
            helm lint infra/helm/velix-service -f infra/helm/values/$svc.yaml
            helm template "$svc" infra/helm/velix-service -f infra/helm/values/$svc.yaml > /dev/null
          done

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: fmt check
        run: terraform fmt -check -recursive infra/terraform
      - name: validate module + environments
        run: |
          for dir in infra/terraform/modules/velix-cell infra/terraform/environments/production infra/terraform/environments/staging; do
            (cd "$dir" && terraform init -backend=false && terraform validate)
          done

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.x'
          work-dir: backend/alpha

  build-images:
    runs-on: ubuntu-latest
    needs: [test, buf-breaking, security-scan]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [routing, identity, media, push, call, notifier]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (reproducible)
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp }}
        run: |
          docker buildx build \
            --build-arg SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
            --build-arg GIT_REVISION="${{ github.sha }}" \
            --provenance=true \
            --sbom=true \
            --tag ghcr.io/akulraghav/${{ matrix.service }}:${{ github.sha }} \
            --push \
            -f backend/services/${{ matrix.service }}/Dockerfile \
            backend/
      - name: Sign image with cosign
        uses: sigstore/cosign-installer@v3
      - name: Cosign keyless signing
        run: |
          cosign sign --yes ghcr.io/akulraghav/${{ matrix.service }}:${{ github.sha }}

  reproducibility:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service: [routing, identity, media, push, call, notifier]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build twice and compare digests
        run: |
          ./infra/scripts/verify-reproducibility.sh ${{ matrix.service }}
