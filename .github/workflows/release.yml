name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release-backend:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        service: [routing, identity, media, push, call, notifier]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp }}
          TAG: ${{ github.ref_name }}
        run: |
          docker buildx build \
            --build-arg SOURCE_DATE_EPOCH="$SOURCE_DATE_EPOCH" \
            --build-arg GIT_REVISION="${{ github.sha }}" \
            --provenance=true \
            --sbom=true \
            --tag ghcr.io/akulraghav/${{ matrix.service }}:${TAG} \
            --tag ghcr.io/akulraghav/${{ matrix.service }}:${{ github.sha }} \
            --push \
            -f backend/services/${{ matrix.service }}/Dockerfile \
            backend/
      - uses: sigstore/cosign-installer@v3
      - name: cosign sign
        run: cosign sign --yes ghcr.io/akulraghav/${{ matrix.service }}:${{ github.ref_name }}

  release-flutter:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.x'
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build release APK
        working-directory: apps/velix_app
        run: |
          flutter pub get
          flutter build apk --release

  github-release:
    runs-on: ubuntu-22.04
    needs: [release-backend, release-flutter]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'rc') }}
