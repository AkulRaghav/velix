# Default values for the velix-service chart.
# Per-service overrides live alongside as values-<service>.yaml.

service:
  name: ""
  port: 8080
  healthPort: 8081

image:
  repository: ""
  # Pinned digest. Set in CI to the freshly-built image.
  digest: ""
  pullPolicy: IfNotPresent

replicas: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  VELIX_ADDR: ":8080"
  VELIX_HEALTH_ADDR: ":8081"
  VELIX_LOG_LEVEL: "info"

# Secrets are delivered as a Kubernetes Secret (synced from Vault by the
# Vault Secrets Operator / external-secrets) and sourced into the container
# environment via envFrom. The secret must contain the VELIX_* keys the
# service requires (e.g. VELIX_DSN, VELIX_NATS_URL, VELIX_TOKEN_KEY, and any
# provider credentials). Set per service in values-<service>.yaml.
envFromSecret: ""

# Vault Agent injection. Per-service Vault role.
vault:
  enabled: true
  role: ""
  secrets: []

# mTLS via SPIFFE/SPIRE.
spire:
  enabled: true
  spiffeID: ""

# Pod-level security.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# HPA on CPU + custom metric (gRPC RPS).
hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 30
  targetCPUUtilizationPercent: 60

# PodDisruptionBudget.
pdb:
  enabled: true
  minAvailable: 2

# NetworkPolicy: deny all egress except listed targets.
networkPolicy:
  enabled: true
  egressTargets:
    - postgres
    - nats
    - redis
    - vault
    - otel-collector
