{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.service.name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.service.name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # gRPC + health from in-cluster only.
    - from:
        - namespaceSelector:
            matchLabels:
              velix.app/zone: trusted
      ports:
        - port: grpc
          protocol: TCP
        - port: health
          protocol: TCP
  egress:
    # Allow DNS.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
    # Default-deny otherwise; per-target egress added per-service via
    # ServiceMonitor + targeted egress rules in production overlays.
{{- end }}
