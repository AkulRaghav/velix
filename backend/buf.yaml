version: v2
# The proto module lives under proto/. Run buf from there:
#   cd proto && buf generate
modules:
  - path: proto
breaking:
  use:
    - FILE
lint:
  use:
    - STANDARD
  except:
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - IMPORT_USED
  enum_zero_value_suffix: _UNSPECIFIED
  service_suffix: Service
